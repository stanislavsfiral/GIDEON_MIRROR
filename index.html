<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QYDYR NEXUS - GIDEON v13.7</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; color: #00ffcc; }
        #telemetry {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0,10,10,0.95); padding: 20px; border: 2px solid #00ffcc; border-radius: 10px;
            width: 280px; box-shadow: 0 0 20px #004444;
        }
        #controls-panel {
            position: fixed; bottom: 15px; left: 15px; z-index: 1000;
            background: rgba(0,20,20,0.9); padding: 15px; border: 1px solid #00ffcc; border-radius: 10px;
            width: 280px;
        }
        .stat { margin-bottom: 8px; display: flex; justify-content: space-between; border-bottom: 1px solid #003333; }
        .val { color: #ff00ff; font-weight: bold; }
        button { 
            background: #002222; border: 1px solid #00ffcc; color: #00ffcc; 
            padding: 8px; cursor: pointer; width: 100%; margin-top: 5px;
            transition: 0.3s; font-family: monospace;
        }
        button:hover { background: #00ffcc; color: #000; }
        .active { background: #00ffcc; color: #000; }
        #video-preview { display: none; }
    </style>
</head>
<body>

    <div id="telemetry">
        <div style="display: flex; align-items: center; margin-bottom: 15px;">
            <div id="sys-led" style="width: 12px; height: 12px; border-radius: 50%; background: #555; margin-right: 10px;"></div>
            <strong style="letter-spacing: 2px;">GIDEON v13.7</strong>
        </div>
        <div class="stat"><span>СТАТУС:</span> <span id="status-val" class="val">ОЖИДАНИЕ</span></div>
        <div class="stat"><span>РЕЗОНАНС:</span> <span id="coh-val" class="val">0.0000</span></div>
        <div class="stat"><span>ЗАРЯД ЯДРА:</span> <span id="charge-val" class="val">0%</span></div>
        <div style="height: 4px; background: #002222; margin-top: 10px;">
            <div id="core-charge" style="height: 100%; width: 0%; background: #00ffcc; transition: 0.3s;"></div>
        </div>
    </div>

    <div id="controls-panel">
        <div style="font-size: 10px; margin-bottom: 10px; opacity: 0.7;">УПРАВЛЕНИЕ ОСЯМИ: <span id="current-axis">Y</span></div>
        <div class="btn-group" style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <button id="btnX" onclick="updateAxis('X')">X</button>
            <button id="btnY" class="active" onclick="updateAxis('Y')">Y</button>
            <button id="btnZ" onclick="updateAxis('Z')">Z</button>
        </div>
        <button id="start-btn" style="margin-top: 15px; font-weight: bold; border-width: 2px;">⚡ АКТИВИРОВАТЬ ЯДРО</button>
    </div>

    <video id="video-preview" src="stream_test.mp4" loop muted playsinline crossorigin="anonymous"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="npy.js"></script> 
    <script src="engine.js"></script>

    <script>
        document.getElementById('start-btn').addEventListener('click', function() {
            const video = document.getElementById('video-preview');
            video.play().then(() => {
                window.gVideo = video;
                document.getElementById('status-val').innerText = "АКТИВЕН";
                this.style.display = "none";
            }).catch(e => console.error("Ошибка видео:", e));
        });

        function updateAxis(axis) {
            window.GIDEON_AXIS = axis;
            document.getElementById('current-axis').innerText = axis;
            document.querySelectorAll('.btn-group button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn' + axis).classList.add('active');
            if(window.rebuildCore) window.rebuildCore();
        }
    </script>
</body>
</html>
