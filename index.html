<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>QYDYR NEXUS - GIDEON v13.7</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; color: #00ffcc; }
        #telemetry {
            position: fixed; top: 15px; left: 15px; z-index: 1000;
            background: rgba(0,10,10,0.95); padding: 20px; border: 2px solid #00ffcc; border-radius: 10px;
            width: 280px; box-shadow: 0 0 20px #004444;
        }
        #controls-panel {
            position: fixed; bottom: 15px; left: 15px; z-index: 1000;
            background: rgba(0,20,20,0.9); padding: 15px; border: 1px solid #00ffcc; border-radius: 10px;
            width: 280px;
        }
        .stat { margin-bottom: 8px; display: flex; justify-content: space-between; border-bottom: 1px solid #003333; }
        .val { color: #ff00ff; font-weight: bold; }
        #sys-led { width: 12px; height: 12px; border-radius: 50%; background: #333; display: inline-block; margin-right: 10px; border: 1px solid #fff; }
        .progress-box { width: 100%; height: 10px; background: #111; border: 1px solid #00ffcc; margin-top: 5px; }
        #core-charge { width: 0%; height: 100%; background: linear-gradient(90deg, #004444, #00ffcc); transition: width 0.3s; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        button { 
            background: #001111; color: #00ffcc; border: 1px solid #00ffcc; 
            padding: 5px 10px; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #00ffcc; color: #000; }
        button.active { background: #ff00ff; color: #fff; border-color: #ff00ff; }
        #start-btn { width: 100%; padding: 10px; font-size: 1.1em; }
    </style>
</head>
<body>

    <div id="telemetry">
        <div style="font-weight: bold; font-size: 1.2em; margin-bottom: 15px; text-align: center; border-bottom: 2px solid #00ffcc;">
            GIDEON ANALYTICS V13.7
        </div>
        <div class="stat">
            <span>SYS LED:</span>
            <span><span id="sys-led"></span><span id="status-val" style="color: #555;">ОЖИДАНИЕ</span></span>
        </div>
        <div class="stat">РЕЗОНАНС: <span id="coh-val" class="val">0.0000</span></div>
        <div class="stat">ЗАРЯД ЯДРА: <span id="charge-val" class="val">0%</span></div>
        <div class="progress-box"><div id="core-charge"></div></div>
    </div>

    <div id="controls-panel">
        <div style="font-size: 0.9em; margin-bottom: 10px;">ОСЬ ВРАЩЕНИЯ: <span id="current-axis" class="val">Y</span></div>
        <div class="controls">
            <button id="btnX" onclick="updateAxis('X')">X</button>
            <button id="btnY" class="active" onclick="updateAxis('Y')">Y</button>
            <button id="btnZ" onclick="updateAxis('Z')">Z</button>
        </div>
        <button id="start-btn" style="margin-top: 15px;">⚡ АКТИВИРОВАТЬ ЯДРО</button>
    </div>

    <video id="video-preview" src="stream_test.mp4" loop muted playsinline crossorigin="anonymous" style="display:none"></video>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="npy.js"></script> 
    <script src="engine.js"></script>

    <script>
        document.getElementById('start-btn').addEventListener('click', function() {
            const video = document.getElementById('video-preview');
            const btn = this;
            
            // 1. Сначала привязываем видео к глобальному объекту
            window.gVideo = video;
            
            // 2. Пытаемся запустить воспроизведение
            video.play().then(() => {
                console.log("[OK] Видеопоток активен. Передача данных начата.");
                document.getElementById('status-val').innerText = "АКТИВЕН";
                document.getElementById('status-val').style.color = "#00ffcc";
                btn.innerText = "ЯДРО ЗАПУЩЕНО";
                btn.style.borderColor = "#ff00ff";
                btn.disabled = true; // Отключаем кнопку после запуска
            }).catch(e => {
                console.error("[ERR] Ошибка запуска видео:", e);
                // Повторная попытка принудительно
                video.muted = true;
                video.play();
            });
        });

        function updateAxis(axis) {
            window.GIDEON_AXIS = axis;
            document.getElementById('current-axis').innerText = axis;
            document.querySelectorAll('.controls button').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn' + axis).classList.add('active');
            
            // Если в движке есть функция пересборки, вызываем её
            if (window.rebuildCore) window.rebuildCore();
        }
    </script>
</body>
</html>
